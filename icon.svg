<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1508"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#e2c97e"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e2c97e" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- Subtle grain texture overlay -->
  <rect width="512" height="512" rx="110" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.15"/>

  <!-- Open book shape -->
  <g transform="translate(256,220)">
    <!-- Left page -->
    <path d="M-8,-95 C-45,-90 -115,-75 -148,-50 L-148,85 C-115,60 -45,50 -8,55 Z"
          fill="#1e1a10" stroke="url(#gold)" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Right page -->
    <path d="M8,-95 C45,-90 115,-75 148,-50 L148,85 C115,60 45,50 8,55 Z"
          fill="#1e1a10" stroke="url(#gold)" stroke-width="1.5" stroke-opacity="0.6"/>
    <!-- Spine -->
    <line x1="0" y1="-97" x2="0" y2="57" stroke="url(#gold)" stroke-width="2.5"/>

    <!-- Lines on left page -->
    <line x1="-130" y1="-45" x2="-22" y2="-30" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="-128" y1="-22" x2="-22" y2="-10" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="-126" y1="2"   x2="-22" y2="10"  stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.3"/>
    <line x1="-124" y1="26"  x2="-22" y2="30"  stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.2"/>

    <!-- Lines on right page -->
    <line x1="22" y1="-30" x2="130" y2="-45" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.5"/>
    <line x1="22" y1="-10" x2="128" y2="-22" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="22" y1="10"  x2="126" y2="2"   stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.3"/>
    <line x1="22" y1="30"  x2="124" y2="26"  stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.2"/>

    <!-- Quill / pen decorative element -->
    <g transform="translate(75,28) rotate(-35)" filter="url(#glow)">
      <path d="M0,-38 C4,-20 6,0 2,18 L0,24 L-2,18 C-6,0 -4,-20 0,-38 Z" fill="url(#gold)" opacity="0.9"/>
      <path d="M0,24 L-3,36 L0,32 L3,36 Z" fill="url(#gold)" opacity="0.7"/>
      <line x1="0" y1="24" x2="0" y2="-38" stroke="#e2c97e" stroke-width="0.8" stroke-opacity="0.5"/>
    </g>
  </g>

  <!-- STORYLINE text -->
  <text x="256" y="376"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="44"
        font-weight="400"
        letter-spacing="7"
        text-anchor="middle"
        fill="url(#gold)"
        filter="url(#glow)">STORYLINE</text>

  <!-- Decorative line under text -->
  <line x1="140" y1="392" x2="372" y2="392" stroke="url(#goldLine)" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Corner ornaments -->
  <g stroke="url(#gold)" stroke-width="1.5" fill="none" stroke-opacity="0.3">
    <path d="M52,52 L52,72 M52,52 L72,52"/>
    <path d="M460,52 L460,72 M460,52 L440,52"/>
    <path d="M52,460 L52,440 M52,460 L72,460"/>
    <path d="M460,460 L460,440 M460,460 L440,460"/>
  </g>
</svg>
