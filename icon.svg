<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141410"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8922a"/>
      <stop offset="50%" stop-color="#e2c97e"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0"/>
      <stop offset="30%" stop-color="#c9a84c" stop-opacity="1"/>
      <stop offset="70%" stop-color="#e2c97e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e2c97e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="512" height="512" rx="112" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-opacity="0.12"/>

  <!-- S large decorative letter -->
  <text
    x="256" y="295"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="228"
    font-weight="400"
    font-style="italic"
    text-anchor="middle"
    fill="url(#gold)"
    opacity="0.07"
    letter-spacing="-4">S</text>

  <!-- STORYLINE main text -->
  <text
    x="256" y="286"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="62"
    font-weight="400"
    letter-spacing="10"
    text-anchor="middle"
    fill="url(#gold)">STORYLINE</text>

  <!-- Decorative line above -->
  <line x1="90" y1="218" x2="422" y2="218" stroke="url(#line)" stroke-width="1"/>

  <!-- Decorative line below -->
  <line x1="90" y1="308" x2="422" y2="308" stroke="url(#line)" stroke-width="1"/>

  <!-- Subtitle -->
  <text
    x="256" y="348"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="16"
    font-weight="300"
    letter-spacing="6"
    text-anchor="middle"
    fill="#c9a84c"
    opacity="0.5">TU UNIVERSO NARRATIVO</text>
</svg>
